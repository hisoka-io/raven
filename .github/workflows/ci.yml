name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt -p raven-core -p raven-crypto-primitives -p raven-indexer -p raven-client -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets

  docs:
    name: cargo doc (no deps, warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  wasm:
    name: check + clippy (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (wasm32, raven-client)
        run: cargo check -p raven-client --target wasm32-unknown-unknown
      - name: cargo clippy (wasm32, raven-client)
        run: cargo clippy -p raven-client --target wasm32-unknown-unknown -- -D warnings
      - name: cargo check (wasm32, raven-inspire-client-wasm)
        run: cargo check --manifest-path adapters/railgun/client-wasm/Cargo.toml --target wasm32-unknown-unknown

  railgun:
    name: railgun adapter workspace (native)
    runs-on: ubuntu-latest
    steps:
      - name: free disk space
        # The adapter workspace's target/ tree (10 inner crates, full
        # test build with `--all-targets`) exceeds the runner's default
        # ~14 GiB free budget. Strip pre-installed tooling that the
        # Rust build path does not touch (CodeQL, Android SDK, .NET,
        # Haskell, Docker pre-pulls) to free ~30 GiB.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: |
          cargo fmt --manifest-path adapters/railgun/Cargo.toml \
            -p raven-railgun-cli \
            -p raven-railgun-core \
            -p raven-railgun-engine \
            -p raven-railgun-http \
            -p raven-railgun-indexer \
            -p raven-railgun-mock-ppoi \
            -p raven-railgun-persistence \
            -p raven-railgun-poseidon \
            -p raven-railgun-ppoi-mirror \
            -- --check
      - name: cargo check
        run: cargo check --manifest-path adapters/railgun/Cargo.toml --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --manifest-path adapters/railgun/Cargo.toml --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path adapters/railgun/Cargo.toml --workspace --all-targets

  isimplepir-tests:
    name: isimplepir (detached workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/isimplepir/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/isimplepir/Cargo.toml --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/isimplepir/Cargo.toml --release
      - name: cargo check (wasm32 client path)
        run: cargo check --manifest-path crates/isimplepir/Cargo.toml --target wasm32-unknown-unknown --no-default-features

  bff-tests:
    name: binary-fuse-filter (detached workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/binary-fuse-filter/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/binary-fuse-filter/Cargo.toml --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/binary-fuse-filter/Cargo.toml --release
      - name: cargo check (wasm32)
        run: cargo check --manifest-path crates/binary-fuse-filter/Cargo.toml --target wasm32-unknown-unknown

  sdk-tests:
    # Fresh-clone-build gate: the TypeScript SDK at adapters/railgun/sdk
    # depends on the wasm-pack output of raven-inspire-client-wasm
    # (gitignored). A fresh clone must:
    #   1. Build the wasm-pack pkg-node + pkg-bundler outputs.
    #   2. Stay under the 500 KB gzipped bundle ceiling
    #      (adapters/railgun/scripts/check-wasm-bundle-size.sh).
    #   3. `pnpm install` resolve cleanly against pnpm-lock.yaml.
    #   4. `pnpm test` pass against the freshly built pkg-node.
    name: sdk tests (typescript + wasm-pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: adapters/railgun/sdk/pnpm-lock.yaml
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build wasm-pack pkg-node + pkg-bundler + size gate
        run: adapters/railgun/scripts/check-wasm-bundle-size.sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: adapters/railgun/sdk
      - name: pnpm test
        run: pnpm test
        working-directory: adapters/railgun/sdk
