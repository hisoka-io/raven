name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt -p raven-core -p raven-crypto-primitives -p raven-indexer -p raven-client -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets

  docs:
    name: cargo doc (no deps, warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  wasm:
    name: check + clippy (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (wasm32, raven-client)
        run: cargo check -p raven-client --target wasm32-unknown-unknown
      - name: cargo clippy (wasm32, raven-client)
        run: cargo clippy -p raven-client --target wasm32-unknown-unknown -- -D warnings
      - name: cargo fmt (raven-inspire-client-wasm)
        run: cargo fmt --manifest-path adapters/railgun/client-wasm/Cargo.toml -- --check
      - name: cargo check (wasm32, raven-inspire-client-wasm)
        run: cargo check --manifest-path adapters/railgun/client-wasm/Cargo.toml --target wasm32-unknown-unknown
      - name: cargo clippy (wasm32, raven-inspire-client-wasm)
        run: cargo clippy --manifest-path adapters/railgun/client-wasm/Cargo.toml --target wasm32-unknown-unknown -- -D warnings

  hygiene:
    name: docs/comment hygiene (no internal-label / no-commit-path leaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - name: check-hygiene
        run: adapters/railgun/scripts/check-hygiene.sh

  railgun-static:
    name: railgun adapter (fmt + check + clippy)
    runs-on: ubuntu-latest
    # cap so a hung tool surfaces instead of blocking the matrix
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "railgun"
      - name: cargo fmt
        run: |
          cargo fmt --manifest-path adapters/railgun/Cargo.toml \
            -p raven-railgun-cli \
            -p raven-railgun-core \
            -p raven-railgun-engine \
            -p raven-railgun-http \
            -p raven-railgun-indexer \
            -p raven-railgun-mock-ppoi \
            -p raven-railgun-persistence \
            -p raven-railgun-poseidon \
            -p raven-railgun-ppoi-mirror \
            -- --check
      - name: cargo check
        run: cargo check --manifest-path adapters/railgun/Cargo.toml --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --manifest-path adapters/railgun/Cargo.toml --workspace --all-targets -- -D warnings

  railgun-tests:
    # split into three balanced shards (ci-test profile + lld + sccache)
    # to keep the adapter + inspire test build under the time budget
    name: railgun tests (${{ matrix.shard.name }})
    needs: railgun-static
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: engine
            packages: "-p raven-railgun-engine"
          - name: cli
            packages: "-p raven-railgun-cli"
          - name: rest
            packages: >-
              -p raven-railgun-http
              -p raven-railgun-indexer
              -p raven-railgun-mock-ppoi
              -p raven-railgun-persistence
              -p raven-railgun-poseidon
              -p raven-railgun-ppoi-mirror
              -p raven-railgun-core
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      # re-declare -D warnings since RUSTFLAGS overrides the workflow-level env
      RUSTFLAGS: "-D warnings -C link-arg=-fuse-ld=lld"
    steps:
      - name: free disk space
        # adapter target/ tree overruns the runner's default free budget
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: install lld linker
        run: sudo apt-get update && sudo apt-get install -y lld
      - name: install sccache
        # v0.0.10 ships sccache 0.10+ for the GHA cache v2 endpoint
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # shared so shards reuse the first shard's target/ instead of rebuilding inspire cold
          shared-key: "railgun-tests"
      - uses: taiki-e/install-action@nextest
      - name: cargo nextest (ci-test profile)
        run: |
          cargo nextest run \
            --manifest-path adapters/railgun/Cargo.toml \
            ${{ matrix.shard.packages }} \
            --all-targets \
            --cargo-profile ci-test \
            --profile ci
      - name: sccache stats
        run: sccache --show-stats
        if: always()

  isimplepir-tests:
    name: isimplepir (detached workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/isimplepir/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/isimplepir/Cargo.toml --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/isimplepir/Cargo.toml --release
      - name: cargo check (wasm32 client path)
        run: cargo check --manifest-path crates/isimplepir/Cargo.toml --target wasm32-unknown-unknown --no-default-features

  bff-tests:
    name: binary-fuse-filter (detached workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --manifest-path crates/binary-fuse-filter/Cargo.toml -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path crates/binary-fuse-filter/Cargo.toml --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --manifest-path crates/binary-fuse-filter/Cargo.toml --release
      - name: cargo check (wasm32)
        run: cargo check --manifest-path crates/binary-fuse-filter/Cargo.toml --target wasm32-unknown-unknown

  sdk-tests:
    # fresh-clone gate: SDK depends on the gitignored wasm-pack output,
    # so this rebuilds it, enforces the bundle ceiling, then runs tests
    name: sdk tests (typescript + wasm-pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: adapters/railgun/sdk/pnpm-lock.yaml
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build wasm-pack pkg-node + pkg-bundler + size gate
        run: adapters/railgun/scripts/check-wasm-bundle-size.sh
      - name: pnpm install
        run: pnpm install --frozen-lockfile
        working-directory: adapters/railgun/sdk
      - name: pnpm test
        run: pnpm test
        working-directory: adapters/railgun/sdk
