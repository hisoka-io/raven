name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets

  detached-railgun:
    name: bin/integrations/railgun (detached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --manifest-path bin/integrations/railgun/Cargo.toml --all-targets -- -D warnings
      - name: build
        run: cargo build --manifest-path bin/integrations/railgun/Cargo.toml --release

  docs:
    name: cargo doc (no deps, warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  wasm:
    # Only raven-client is built for wasm32. raven-core path-depends on
    # raven-inspire (which transitively pulls tokio/axum/reqwest), and
    # raven-indexer is server-side; neither targets wasm by design.
    name: check + clippy (wasm32-unknown-unknown, raven-client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (wasm32)
        run: cargo check -p raven-client --target wasm32-unknown-unknown
      - name: cargo clippy (wasm32)
        run: cargo clippy -p raven-client --target wasm32-unknown-unknown -- -D warnings

  fork-tests:
    name: fork tests (raven-inspire --all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hisoka-io/inspire-rs
          path: crates/raven-inspire
          token: ${{ secrets.SUBMODULE_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (raven-inspire)
        run: cargo test --manifest-path crates/raven-inspire/Cargo.toml --release --all-features
