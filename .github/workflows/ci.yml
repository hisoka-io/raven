name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets

  detached-indexer:
    name: raven-indexer (detached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --manifest-path crates/raven-indexer/Cargo.toml --all-targets -- -D warnings
      - name: test
        run: cargo test --manifest-path crates/raven-indexer/Cargo.toml --all-targets

  detached-railgun:
    name: bin/integrations/railgun (detached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --manifest-path bin/integrations/railgun/Cargo.toml --all-targets -- -D warnings
      - name: build
        run: cargo build --manifest-path bin/integrations/railgun/Cargo.toml --release

  docs:
    name: cargo doc (no deps, warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  wasm:
    name: check + clippy (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lib / bin targets only. Test-only deps (proptest -> wait-timeout) pull
      # platform-specific code that doesn't compile for wasm32.
      - name: cargo check (wasm32)
        run: cargo check --workspace --target wasm32-unknown-unknown
      - name: cargo clippy (wasm32)
        run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings
