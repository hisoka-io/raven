[workspace]

[package]
name = "raven-railgun"
version = "0.1.0-alpha.0"
edition = "2021"
rust-version = "1.85"
authors = ["Hisoka.io"]
license = "Apache-2.0"
description = "Railgun integration entry point for Raven."
publish = false

[[bin]]
name = "raven-railgun"
path = "src/main.rs"

[lints.rust]
unsafe_code = "deny"
rust_2018_idioms = { level = "warn", priority = -1 }
unreachable_pub = "warn"

[lints.clippy]
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stderr = "deny"
unwrap_used = "allow"
expect_used = "allow"
panic = "allow"
print_stdout = "allow"
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
doc_markdown = "allow"

[dependencies]
raven-core = { path = "../../../crates/raven-core", version = "0.1.0-alpha.0" }
raven-indexer = { path = "../../../crates/raven-indexer", version = "0.1.0-alpha.0" }
