# Keyless RPC pool. Paste this [rpc_pool] table into the multi-instance
# config next to [global]. With >= 2 urls the indexer round-robins
# eth_getLogs across them behind a per-endpoint circuit breaker, and
# [global].rpc_url becomes a fallback. Live indexing needs only the
# public methods these endpoints serve; archival eth_call is configured
# separately for bootstrap.

[rpc_pool]
strategy = "round-robin"        # or "primary-with-failover"
per_endpoint_rps = 15
per_endpoint_burst = 30
cooldown_secs = 30
urls = [
  # fast, getLogs-capable
  "https://eth.drpc.org",
  "https://ethereum-rpc.publicnode.com",
  "https://ethereum.public.blockpi.network/v1/rpc/public",
  "https://eth1.lava.build",
  "https://ethereum-public.nodies.app",
  "https://eth.api.onfinality.io/public",
  "https://rpc.fullsend.to",
  # slower, failover under the circuit breaker
  "https://1rpc.io/eth",
  "https://rpc.sentio.xyz/mainnet",
  "https://rpc.mevblocker.io/noreverts",
  "https://rpc.flashbots.net",
  "https://ethereum-mainnet.gateway.tatum.io",
]
