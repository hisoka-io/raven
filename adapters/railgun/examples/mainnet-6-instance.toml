# Canonical V1.5 mainnet 6-instance shape consumed by
# `raven-railgun serve-production --config <this file>`.
#
# Six instances per MAINNET_STATE.md:
#   - 3 static commit-trees (filled, immutable; Static role + static_default snapshot policy)
#   - 1 live commit-tree (currently filling; Live role)
#   - 2 PPOI list instances (Live role; UpstreamSignature verification)

[global]
bind = "0.0.0.0:8080"
# REPLACE_ME: bearer token for the operator-side HTTP server. MUST
# be at least 16 bytes of entropy (config-time check enforces this
# and bails on the literal "REPLACE_ME" string). Generate via e.g.
# `openssl rand -hex 32`.
token = "REPLACE_ME"
rpc_url = "https://mainnet.example/eth"
railgun_proxy = "0xfa7093cdd9ee6932b4eb2c9e1cde7ce00b1fa4b9"
chain_id = 1
start_block = 14737691
mirror_endpoint = "https://poi.us.proxy.railwayapi.xyz"
max_concurrent_queries = 4
respond_timeout_secs = 30
record_size = 512
entries_per_shard = 2048
scheme_tag = "raven-inspire-twopacking-inspiring-wp3-cache-session"
use_flock = true
channel_capacity = 1024

# Trust X-Forwarded-For / Forwarded for per-IP rate-limit keying.
# REQUIRED behind any reverse proxy (Cloudflare Tunnel, ALB, nginx)
# where the inbound TCP peer is the proxy daemon (one IP for all
# public visitors). Without this, every internet visitor shares a
# single rate-limit bucket and a single demo session trips the
# bucket for everyone behind the proxy.
#
# SECURITY: only set true when the origin port is firewalled to the
# proxy network. A publicly reachable origin port lets attackers
# forge X-Forwarded-For and bypass per-IP throttling.
trust_proxy_header = false

# Per-IP rate-limit refill rate (requests / second). Default 200.
# rate_limit_rps = 200

# Per-IP rate-limit burst budget (token-bucket capacity). Default 400.
# rate_limit_burst = 400

[[instance]]
id = "commit-tree-0"
role = "static"
encoder = "per-node"
tree_number = 0
data_dir = "/var/lib/raven-railgun/commit-tree-0"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 0 } }

[[instance]]
id = "commit-tree-1"
role = "static"
encoder = "per-node"
tree_number = 1
data_dir = "/var/lib/raven-railgun/commit-tree-1"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 1 } }

[[instance]]
id = "commit-tree-2"
role = "static"
encoder = "per-node"
tree_number = 2
data_dir = "/var/lib/raven-railgun/commit-tree-2"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 2 } }

[[instance]]
id = "commit-tree-3"
role = "live"
encoder = "per-node"
tree_number = 3
data_dir = "/var/lib/raven-railgun/commit-tree-3"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 3 } }

[[instance]]
id = "ppoi-status-ofac"
role = "live"
encoder = "per-list-status"
list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88"
data_dir = "/var/lib/raven-railgun/ppoi-status-ofac"
verification_mode = "upstream-signature"
data_source = { kind = "mirror", list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88", what = "status" }

[[instance]]
id = "ppoi-paths-ofac"
role = "live"
encoder = "per-list-node"
list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88"
data_dir = "/var/lib/raven-railgun/ppoi-paths-ofac"
verification_mode = "upstream-signature"
data_source = { kind = "mirror", list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88", what = "path" }
