# Example 6-instance mainnet config for
# `raven-railgun serve-production --config <this file>`.
#
# Mirrors the Railgun mainnet topology: 3 static (filled) commit-trees,
# 1 live commit-tree, and 2 PPOI list instances. Adjust the [[instance]]
# blocks to match the current on-chain tree topology.

[global]
bind = "0.0.0.0:8080"
# bearer token; config-time check rejects the literal "REPLACE_ME" and
# requires >= 16 bytes of entropy. Generate via `openssl rand -hex 32`.
token = "REPLACE_ME"
rpc_url = "https://mainnet.example/eth"
railgun_proxy = "0xfa7093cdd9ee6932b4eb2c9e1cde7ce00b1fa4b9"
chain_id = 1
start_block = 14737691
mirror_endpoint = "https://poi.us.proxy.railwayapi.xyz"
max_concurrent_queries = 4
respond_timeout_secs = 30
record_size = 512
entries_per_shard = 2048
scheme_tag = "raven-inspire-twopacking-inspiring-wp3-cache-session"
use_flock = true
channel_capacity = 1024

# Key per-IP rate limiting off X-Forwarded-For; set true ONLY behind a
# trusted reverse proxy whose origin port is firewalled to it. A publicly
# reachable origin lets attackers forge the header and bypass throttling.
trust_proxy_header = false

# rate_limit_rps = 200      # per-IP refill rate (req/s)
# rate_limit_burst = 400    # per-IP token-bucket capacity

[[instance]]
id = "commit-tree-0"
role = "static"
encoder = "per-node"
tree_number = 0
data_dir = "/var/lib/raven-railgun/commit-tree-0"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 0 } }

[[instance]]
id = "commit-tree-1"
role = "static"
encoder = "per-node"
tree_number = 1
data_dir = "/var/lib/raven-railgun/commit-tree-1"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 1 } }

[[instance]]
id = "commit-tree-2"
role = "static"
encoder = "per-node"
tree_number = 2
data_dir = "/var/lib/raven-railgun/commit-tree-2"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 2 } }

[[instance]]
id = "commit-tree-3"
role = "live"
encoder = "per-node"
tree_number = 3
data_dir = "/var/lib/raven-railgun/commit-tree-3"
verification_mode = "chain-root-history"
data_source = { kind = "indexer", filter = { tree_number = 3 } }

[[instance]]
id = "ppoi-status-ofac"
role = "live"
encoder = "per-list-status"
list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88"
data_dir = "/var/lib/raven-railgun/ppoi-status-ofac"
verification_mode = "upstream-signature"
data_source = { kind = "mirror", list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88", what = "status" }

[[instance]]
id = "ppoi-paths-ofac"
role = "live"
encoder = "per-list-node"
list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88"
data_dir = "/var/lib/raven-railgun/ppoi-paths-ofac"
verification_mode = "upstream-signature"
data_source = { kind = "mirror", list_key = "efc6ddb59c098a13fb2b618fdae94c1c3a807abc8fb1837c93620c9143ee9e88", what = "path" }
